# ─────────────────────────────────────────
# 거래 기본 설정
# ─────────────────────────────────────────
trading:
  trade_mode: "futures"  # "spot" (현물) 또는 "futures" (선물)
  execution: "paper"     # "paper" (가짜 돈) 또는 "live" (실제 돈 ← 신중하게!)
  leverage_min: 2        # 신호 약할 때 최소 레버리지
  leverage_max: 5        # 신호 강할 때 최대 레버리지
  markets:               # 동시에 감시할 코인 목록
    - "BTC/USDT:USDT"    # 비트코인
    - "ETH/USDT:USDT"    # 이더리움
    - "XRP/USDT:USDT"    # 리플
    - "DOGE/USDT:USDT"   # 도지코인
    - "SOL/USDT:USDT"    # 솔라나
    - "BNB/USDT:USDT"    # 바이낸스코인
    - "ADA/USDT:USDT"    # 에이다
    - "AVAX/USDT:USDT"   # 아발란체
    - "LINK/USDT:USDT"   # 체인링크
    - "LTC/USDT:USDT"    # 라이트코인
  max_positions: 2       # 동시에 최대 몇 개 포지션을 열지 (롱+숏 합산)
  interval: "1m"         # 캔들 단위 (1m = 1분봉, 1h = 1시간봉, 1d = 하루봉)
  candle_count: 200      # 한 번에 몇 개의 캔들 데이터를 불러올지
  check_interval: 60     # 몇 초마다 신호를 확인할지 (60 = 1분마다)

# ─────────────────────────────────────────
# 전략 설정 (언제 살지, 언제 팔지)
# ─────────────────────────────────────────
strategy:
  # ── 볼린저 밴드 (무릎/어깨 위치 판단) ──
  bb_period: 20          # 밴드 계산에 쓸 캔들 개수 (20 = 최근 20개 기준)
  bb_std: 2.0            # 밴드 너비 (2.0 = 표준 너비, 클수록 넓어짐)
  bb_entry_lower: 0.25   # 이 위치 아래면 "무릎" (0.25 = 밴드 하위 25%)
  bb_entry_upper: 0.75   # 이 위치 위면 "어깨" (0.75 = 밴드 상위 75%)

  # ── RSI (반등/하락 시작 감지) ──
  rsi_period: 14         # RSI 계산에 쓸 캔들 개수
  rsi_oversold: 35       # 이 아래면 "너무 많이 떨어진 상태" → 반등 노림
  rsi_overbought: 65     # 이 위면 "너무 많이 오른 상태" → 하락 노림

  # ── 손절/익절 거리 ──
  atr_period: 14         # 변동성 계산에 쓸 캔들 개수
  atr_stop_mult: 1.5     # 손절: 진입가에서 변동폭 × 1.5 만큼 반대 방향으로 가면 청산
  atr_target_mult: 3.0   # 익절: 진입가에서 변동폭 × 3.0 만큼 목표 방향으로 가면 청산

  # ── 거래량 ──
  volume_mult: 1.5       # 평소보다 몇 배 이상 거래될 때만 진입 (1.5 = 1.5배)

# ─────────────────────────────────────────
# 알림 설정
# ─────────────────────────────────────────
notification:
  daily_report_time: "22:00"          # 매일 리포트 보내는 시각
  recipient_email: "byungchul6821@gmail.com"

# ─────────────────────────────────────────
# 리스크 관리 설정 (손해 방지)
# ─────────────────────────────────────────
risk:
  initial_capital: 1500.0     # 시작 가상 자금 (1500 USDT ≈ 200만원)
  risk_per_trade_min: 0.01     # 신호가 약할 때 최소 위험 비율 (1%)
  risk_per_trade_max: 0.04     # 신호가 강할 때 최대 위험 비율 (4%)
  score_cap: 30.0              # 이 점수 이상이면 최대 비율 적용 (score 정규화 기준)
  max_position_ratio: 0.45     # 한 코인에 아무리 많아도 자산의 이 비율까지만 투자 (0.45 = 45%)
  daily_loss_limit: 0.10       # 하루에 몇 % 이상 잃으면 거래 중단 (0.10 = 10%)
  time_stop_candles: 60        # 몇 개 봉이 지나도 수익 없으면 강제 청산 (60봉 = 60분)
